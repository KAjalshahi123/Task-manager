spring.application.name=team-task-manager
server.port=8080

# Active Profile
spring.profiles.active=dev

# JWT Configuration
jwt.secret= 1234567890123456789012345678901234567890123456789012345678901234
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.taskmanager=DEBUG
